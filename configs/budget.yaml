budget:
  max_trace_candidates: 4
  max_navigation_steps: 8
  max_zoom_actions: 2
  max_low_gain_streak: 2
  max_retries_per_stage: 1
  case_timeout_seconds: 900
  stage_timeout_seconds:
    trace: 300
    navigate: 120
    observe: 300
  force_high_mag_below_priority: 3
  default_output_crop_size: 256
  magnification_to_region_size:
    "1.0": 1024
    "2.5": 512
    "5.0": 256
