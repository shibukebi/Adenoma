metrics:
  primary:
    - name: serrated_accuracy
      description: "Case-level serrated lesion vs non-serrated lesion accuracy."
    - name: ssl_like_accuracy
      description: "Case-level agreement for SSL-like structure assessment."
    - name: dysplasia_proxy_accuracy
      description: "Weak agreement between dysplasia assessment and grade-derived proxy target."
    - name: trace_cluster_count
      description: "Number of retained trace clusters per case."
    - name: trajectory_length
      description: "Number of navigation steps excluding END."
    - name: case_runtime_ms
      description: "End-to-end runtime for a case."
    - name: ssl_like_checklist_completeness
      description: "Fraction of SSL-like architecture checklist items assigned a non-empty status."
  secondary:
    - name: cache_hit_rate
      description: "Fraction of adapter or description requests served from cache."
    - name: audit_warning_count
      description: "Count of warnings raised by the audit stage."
    - name: replay_completeness
      description: "Whether a run can be reconstructed from its JSONL log."
    - name: serrated_checklist_completeness
      description: "Fraction of serrated lesion checklist items assigned a non-empty status."
    - name: dysplasia_checklist_completeness
      description: "Fraction of dysplasia checklist items assigned a non-empty status."
    - name: average_step_latency_ms
      description: "Mean per-step observation latency."
    - name: estimated_case_cost_units
      description: "Proxy cost from trace attempts and observation steps."
future_metrics:
  - evidence_completeness
  - human_review_pass_rate
  - slidebench_vqa_accuracy
  - pathmmu_hr2_accuracy
  - dice
  - iou
